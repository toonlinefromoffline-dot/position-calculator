<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MT5 Position Calculator</title>

<style>

body{

background:#0f172a;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;

}

.card{

background:#1e293b;
padding:30px;
border-radius:20px;
width:430px;

}

h1{

text-align:center;
margin-bottom:25px;

}

label{

display:block;
margin-top:15px;
margin-bottom:6px;

}

input,select{

width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#334155;
color:white;
font-size:18px;
box-sizing:border-box;

}

button{

width:100%;
padding:15px;
margin-top:25px;
border:none;
border-radius:12px;
font-size:20px;
cursor:pointer;
background:#22c55e;
color:white;

}

.result{

margin-top:25px;
background:#334155;
padding:20px;
border-radius:12px;

}

.row{

margin-top:12px;
font-size:18px;

}

</style>

</head>

<body>

<div class="card">

<h1>MT5 Position Calculator</h1>

<label>Instrument</label>

<select id="symbol">

<option>EUR/USD</option>
<option>GBP/USD</option>
<option>USD/JPY</option>
<option>USD/CAD</option>
<option>AUD/USD</option>
<option>NZD/USD</option>
<option>USD/CHF</option>

<option>EUR/GBP</option>
<option>EUR/JPY</option>
<option>EUR/CHF</option>
<option>EUR/CAD</option>
<option>EUR/AUD</option>

<option>GBP/JPY</option>
<option>GBP/CHF</option>
<option>GBP/CAD</option>

<option>AUD/JPY</option>
<option>AUD/CAD</option>

<option>CAD/JPY</option>

<option>CHF/JPY</option>

<option>NZD/JPY</option>

<option>XAU/USD</option>

<option>XAG/USD</option>

</select>


<label>Balance ($)</label>

<input id="balance" value="1000">


<label>Risk (%)</label>

<input id="risk" value="1">


<label>Entry Price</label>

<input id="entry">


<label>Stop Loss</label>

<input id="stop">


<button onclick="calc()">

Calculate

</button>


<div class="result">

<div class="row" id="riskMoney">

Risk:

</div>

<div class="row" id="stopPips">

Stop:

</div>

<div class="row" id="lots">

Lots:

</div>

</div>

</div>


<script>

const data={

"EUR/USD":0.0001,

"GBP/USD":0.0001,

"USD/JPY":0.01,

"USD/CAD":0.0001,

"AUD/USD":0.0001,

"NZD/USD":0.0001,

"USD/CHF":0.0001,

"EUR/GBP":0.0001,

"EUR/JPY":0.01,

"EUR/CHF":0.0001,

"EUR/CAD":0.0001,

"EUR/AUD":0.0001,

"GBP/JPY":0.01,

"GBP/CHF":0.0001,

"GBP/CAD":0.0001,

"AUD/JPY":0.01,

"AUD/CAD":0.0001,

"CAD/JPY":0.01,

"CHF/JPY":0.01,

"NZD/JPY":0.01,

"XAU/USD":0.01,

"XAG/USD":0.01

};


function calc(){

let balance=parseFloat(

document.getElementById("balance").value);

let risk=parseFloat(

document.getElementById("risk").value);

let entry=parseFloat(

document.getElementById("entry").value);

let stop=parseFloat(

document.getElementById("stop").value);

let symbol=

document.getElementById("symbol").value;

let pip=data[symbol];


let riskMoney=

balance*risk/100;


let stopDistance=

Math.abs(entry-stop);


let pips=

stopDistance/pip;


let lots;


if(symbol=="XAU/USD"){

lots=

riskMoney/

(stopDistance*100);

}

else if(symbol=="XAG/USD"){

lots=

riskMoney/

(stopDistance*5000);

}

else{

lots=

riskMoney/

(pips*10);

}


document.getElementById("riskMoney")

.innerHTML=

"Risk: $"+

riskMoney.toFixed(2);


document.getElementById("stopPips")

.innerHTML=

"Stop: "+

pips.toFixed(1)+

" pips";


document.getElementById("lots")

.innerHTML=

"Lots: "+

lots.toFixed(2);

}

</script>

</body>

</html>
